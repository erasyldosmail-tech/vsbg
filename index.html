<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Order summary card</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  </head>
  <body
    class="min-h-screen min-w-screen m-0 p-0 box-border bg-blue-200 flex justify-center items-center"
  >
    <div class="h-[600px] w-[400px] flex flex-col bg-white rounded-xl">
      <img src="images/illustration-hero.svg" alt="" class="rounded-t-xl" />
      <div class="flex justify-center items-center flex-col m-5 gap-3">
        <h2 class="text-2xl">Order Summary</h2>
        <p class="text-base text-center font-thin">
          You can now listen to millions of songs, <br />audiobooks, and
          podcasts on any device <br />anywhere you like!
        </p>
        <div
          class="bg-blue-200 flex p-3 w-[300px] rounded-xl items-center justify-between"
        >
          <div class="flex flex-row gap-2">
            <img src="images/icon-music.svg" alt="" />
            <div class="">
              <h5 class="font-bold">Annual Plan</h5>
              <span class="opacity-50 font-thin"> $59.99/year</span>
            </div>
          </div>
          <a href="#" class=""> Change</a>
        </div>
        <button
          class="w-[300px] bg-blue-600 cursor-pointer rounded-xl text-white p-3 px-5"
        >
          Proceed to Payment
        </button>
        <button class="w-[300px] cursor-pointer ounded-xl p-3 px-5">
          Cancel Order
        </button>
      </div>
    </div>
  </body>
</html>
